name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller SampleForge_Windows.spec

      - name: Zip the output
        run: |
          Compress-Archive -Path dist\SampleForge\* -DestinationPath dist\SampleForge_Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SampleForge-Windows
          path: dist\SampleForge_Windows.zip
          retention-days: 30
